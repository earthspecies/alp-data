site_name: esp-data
site_description: TODO
strict: true
site_url: http://go/python/docs

# TODO (milad) check out https://mkdocstrings.github.io/recipes/
# TODO (milad) check out options here: https://github.com/mkdocstrings/mkdocstrings/blob/main/mkdocs.yml

repo_name: earthspecies/esp-data
repo_url: https://github.com/earthspecies/esp-data

nav:
  - Getting Started: index.md
  - Datasets: datasets.md
  - io: io.md
  - Transforms: transforms.md
  - Concatenate datasets: concatenate.md
  - API Reference: reference.md

theme:
  name: material
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - toc.integrate
  favicon: assets/favicon.png
  logo: assets/favicon.png

  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
      primary: teal
      accent: pink
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
      primary: teal
      accent: pink

plugins:
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: numpy
            show_category_heading: false
            show_symbol_type_toc: true
            show_symbol_type_heading: true
            modernize_annotations: true
            show_bases: false
            show_source: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

extra:
  version:
    provider: mike
