site_name: alp-data
site_description: TODO
strict: true
site_url: http://go/python/docs

# TODO (milad) check out https://mkdocstrings.github.io/recipes/
# TODO (milad) check out options here: https://github.com/mkdocstrings/mkdocstrings/blob/main/mkdocs.yml

repo_name: earthspecies/alp-data
repo_url: https://github.com/earthspecies/alp-data

nav:
  - Guides:
      - Getting Started: index.md
      - Datasets: datasets.md
      - IO: io.md
      - Transforms: transforms.md
      - Concatenate Datasets: concatenate.md
      - Chain Datasets: chain.md
      - Backends: backends.md
  - Reference:
      - API Reference: reference.md

theme:
  name: material
  favicon: assets/favicon.png
  logo: assets/esp-logotype-only-white.png
  font: false
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.sections
    - navigation.top
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to system preference

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: numpy
            show_category_heading: false
            show_symbol_type_toc: true
            show_symbol_type_heading: true
            modernize_annotations: true
            show_bases: false
            show_source: true

hooks:
  - docs/hooks/dataset_info_hook.py

markdown_extensions:
  - toc:
      title: On this page
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

extra_css:
  - stylesheets/extra.css

extra:
  version:
    provider: mike
