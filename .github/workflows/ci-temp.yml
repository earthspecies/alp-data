name: CI Debug (self-hosted runner)

on:    # yamllint disable-line rule:truthy
    workflow_dispatch:
    pull_request:
        paths:
            - .github/workflows/ci-temp.yml

jobs:
    debug:
        name: Debug self-hosted runner
        runs-on: self-hosted
        steps:
            - name: System info
              run: |
                  echo "=== OS ==="
                  cat /etc/os-release || true
                  echo "=== CPU ==="
                  nproc
                  echo "=== Memory ==="
                  free -h
                  echo "=== Disk ==="
                  df -h
                  echo "=== User ==="
                  whoami
                  echo "=== Working directory ==="
                  pwd

            - uses: actions/checkout@v4

            - name: Verify checkout
              run: |
                  echo "=== Git status ==="
                  git log --oneline -3
                  ls -la

            - name: Check GCP access (pod service account)
              run: |
                  echo "=== Check if gcloud is available ==="
                  which gcloud && gcloud --version || echo "gcloud not installed"
                  echo "=== Check default credentials ==="
                  gcloud auth list 2>/dev/null || echo "No gcloud auth configured"
                  echo "=== Check metadata server (GKE Workload Identity) ==="
                  curl -s -H "Metadata-Flavor: Google" \
                      "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/email" \
                      2>/dev/null || echo "Metadata server not reachable"

            - name: Check tool availability
              run: |
                  echo "=== Python ==="
                  python3 --version 2>/dev/null || echo "python3 not found"
                  echo "=== Java ==="
                  java -version 2>/dev/null || echo "java not found"
                  echo "=== uv ==="
                  uv --version 2>/dev/null || echo "uv not found"
                  echo "=== git ==="
                  git --version
                  echo "=== curl ==="
                  curl --version | head -1
    test:
        name: Run pytests tests
        runs-on: self-hosted
        permissions:
            contents: read
            id-token: write

        steps:
            - uses: actions/checkout@v4

            - name: Authenticate to Google Cloud
              uses: "google-github-actions/auth@v2"
              with:
                  workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER_ID }}
                  service_account: ${{ secrets.GH_ACTIONS_SA }}

            - name: Install uv
              uses: astral-sh/setup-uv@v4
              with:
                  enable-cache: true

            - name: "Set up Python"
              uses: actions/setup-python@v5
              with:
                  python-version-file: ".python-version"

            - name: Install the project
              run: uv sync --all-extras --dev

            - name: Checking dependencies
              run: uv run deptry .

            - name: Run Doctests
              run: uv run pytest --doctest-modules esp_data

            - name: Run tests
              run: uv run pytest tests

    test-multi-version:
        name: Run tests on multiple Python versions
        runs-on: self-hosted
        strategy:
            matrix:
                python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        permissions:
            contents: read
            id-token: write

        steps:
            - uses: actions/checkout@v4

            - name: Authenticate to Google Cloud
              uses: "google-github-actions/auth@v2"
              with:
                  workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER_ID }}
                  service_account: ${{ secrets.GH_ACTIONS_SA }}

            - name: Install uv
              uses: astral-sh/setup-uv@v4
              with:
                  enable-cache: true

            - name: "Set up Python ${{ matrix.python-version }}"
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install the project
              run: uv sync --all-extras --dev

            - name: Run core tests
              run: uv run pytest tests/io
