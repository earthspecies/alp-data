name: Pytests

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    # Uncomment next line to trigger CI on pull requests to *only* the main and dev branches.
    # branches: ["main", "dev"]

jobs:
  test:
    name: Run pytests tests
    runs-on: self-hosted
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: "google-github-actions/auth@v2"
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GH_ACTIONS_SA }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          version: "0.9.22"

      - name: Install the project
        run: uv sync --all-extras --dev --managed-python

      - name: Checking dependencies
        run: uv run deptry .

      - name: Run Doctests
        run: uv run pytest --doctest-modules esp_data

      - name: Run tests
        run: uv run pytest tests

  test-multi-version:
    name: Run tests on multiple Python versions
    runs-on: self-hosted
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: "google-github-actions/auth@v2"
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ secrets.GH_ACTIONS_SA }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          version: "0.9.22"

      - name: Install the project
        run: uv sync --all-extras --dev --python ${{ matrix.python-version }} --managed-python

      - name: Run core tests
        run: uv run pytest tests/io
