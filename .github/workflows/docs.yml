name: Build the docs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - v[0-9]+.[0-9]+*
      - latest

jobs:
  build-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Configure Git user
        run: |
          git config --local user.name "${{ github.actor }}"
          git config --local user.email "${{ github.actor }}@users.noreply.github.com"

      # - name: Deploy main branch
      #   if: github.ref == 'refs/heads/main'
      #   run: uv run mike deploy -b docs-site --push --update-aliases main-branch

      - name: Deploy version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          uv run mike deploy -b docs-site --push --update-aliases $VERSION

      - name: Update latest tag
        if: if: github.ref == 'refs/tags/latest'
        run: |
          uv run mike deploy -b docs-site --push --update-aliases latest
