    # Runs on ESP's self-hosted runners on GKE. GCP credentials are available
    # automatically via the node's service account — no workload identity
    # federation or secrets needed.
    test-self-hosted:
        name: Run pytests tests
        runs-on: self-hosted

        steps:
            - uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v4
              with:
                  enable-cache: true

            - name: "Set up Python"
              uses: actions/setup-python@v5
              with:
                  python-version-file: ".python-version"

            - name: Install the project
              run: uv sync --all-extras --dev

            - name: Display Python version
              run: python -c "import sys; print(sys.version)"

            - name: Checking dependencies
              run: uv run deptry .

            - name: Run Doctests
              run: uv run pytest --doctest-modules esp_data

            - name: Run tests
              run: uv run pytest tests

    test-multi-version-self-hosted:
        name: Run tests on multiple Python versions
        runs-on: self-hosted
        strategy:
            matrix:
                python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

        steps:
            - uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v4
              with:
                  enable-cache: true

            - name: "Set up Python ${{ matrix.python-version }}"
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install the project
              run: uv sync --all-extras --dev

            - name: Run core tests
              run: uv run pytest tests/io
