dataset_name: my_custom_dataset
split: train
output_take_and_give:
  bad_text: pure_text
  label: label
data_root: gs://esp-ml-datasets/insectset_459/v0.1.0/raw/
transformations:
  - type: deduplicate
    subset: null

  - type: rename_transform
    feature_map:
      text: bad_text
      label: label

  - type: label_from_feature
    feature: label
    output_feature: label
    override: true
